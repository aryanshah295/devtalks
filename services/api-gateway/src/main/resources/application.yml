spring:
  application:
    name: api-gateway

server:
  port: 8080
  shutdown: graceful

# In-process-only gRPC. Disable the TCP listener; REST controllers dial via
# the in-process channel bean in GrpcConfig.kt.
grpc:
  server:
    in-process-name: devtalks-internal
    port: -1

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
