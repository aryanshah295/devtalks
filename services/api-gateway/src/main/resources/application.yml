spring:
  application:
    name: api-gateway

# GCP project ID resolved from env (set in Cloud Run via Terraform) with a
# local-dev fallback. Used by FirestoreConfig (and Firebase Admin in PR 3).
gcp:
  project-id: ${GCP_PROJECT_ID:devtalks-aryan-4787}

server:
  port: 8080
  shutdown: graceful

# In-process-only gRPC. Disable the TCP listener; REST controllers dial via
# the in-process channel bean in GrpcConfig.kt.
grpc:
  server:
    in-process-name: devtalks-internal
    port: -1

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
