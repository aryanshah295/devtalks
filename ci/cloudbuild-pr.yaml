# PR check pipeline.
# Triggered on pull requests against main. Validates that the change compiles
# and tests pass. Does NOT push images, apply Terraform, or deploy anything.

steps:
  - id: buf-generate
    name: bufbuild/buf:1.41.0
    dir: proto
    args: ["generate"]

  - id: gradle-build
    name: eclipse-temurin:21-jdk-jammy
    dir: .
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail
        # buf-generate (above) already wrote proto/gen/; skip the in-Gradle regen
        # since the JDK image doesn't have the buf binary.
        ./gradlew --no-daemon :services:api-gateway:build -x :proto-gen:generateProto

  - id: frontend-build
    name: node:20
    dir: frontend
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail
        corepack enable
        pnpm install --frozen-lockfile
        pnpm build

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

timeout: 1200s