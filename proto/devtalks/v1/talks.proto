syntax = "proto3";

package devtalks.v1;

option java_package = "com.devtalks.v1";
option java_multiple_files = true;

// Phase 0 stub. Phase 1 replaces this file with the real Talk / TalkCatalog
// schema described in PLAN.md. The HealthService here exists so the buf
// workspace and codegen pipeline have something to generate against.
service HealthService {
  rpc HealthCheck(HealthCheckRequest) returns (HealthCheckResponse);
}

message HealthCheckRequest {}

message HealthCheckResponse {
  string status = 1;
  string version = 2;
}