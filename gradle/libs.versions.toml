[versions]
kotlin = "1.9.23"
springBoot = "3.2.5"
springDependencyManagement = "1.1.4"
jib = "3.4.2"
grpc = "1.62.2"
grpcKotlin = "1.4.1"
protobuf = "3.25.3"
logstashEncoder = "7.4"
netDevhGrpc = "3.1.0.RELEASE"
googleCloudLibrariesBom = "26.49.0"
firebaseAdmin = "9.3.0"
googleCloudFirestore = "3.20.0"
mockk = "1.13.10"

[libraries]
spring-boot-starter-web        = { module = "org.springframework.boot:spring-boot-starter-web" }
spring-boot-starter-actuator   = { module = "org.springframework.boot:spring-boot-starter-actuator" }
spring-boot-starter-security   = { module = "org.springframework.boot:spring-boot-starter-security" }
spring-boot-starter-test       = { module = "org.springframework.boot:spring-boot-starter-test" }
spring-security-test           = { module = "org.springframework.security:spring-security-test" }
jackson-module-kotlin          = { module = "com.fasterxml.jackson.module:jackson-module-kotlin" }
kotlin-reflect                 = { module = "org.jetbrains.kotlin:kotlin-reflect" }
logstash-logback-encoder       = { module = "net.logstash.logback:logstash-logback-encoder", version.ref = "logstashEncoder" }
grpc-kotlin-stub               = { module = "io.grpc:grpc-kotlin-stub", version.ref = "grpcKotlin" }
# io.grpc:* are version-managed by the google-cloud libraries-bom; no explicit version here
# so they align with whatever google-cloud-firestore needs at runtime.
grpc-protobuf                  = { module = "io.grpc:grpc-protobuf" }
grpc-stub                      = { module = "io.grpc:grpc-stub" }
grpc-netty-shaded              = { module = "io.grpc:grpc-netty-shaded" }
grpc-spring-boot-starter       = { module = "net.devh:grpc-server-spring-boot-starter", version.ref = "netDevhGrpc" }
# com.google.protobuf:* are version-managed by the google-cloud libraries-bom.
protobuf-kotlin                = { module = "com.google.protobuf:protobuf-kotlin" }
protobuf-java                  = { module = "com.google.protobuf:protobuf-java" }

# Google Cloud + Firebase
google-cloud-libraries-bom     = { module = "com.google.cloud:libraries-bom", version.ref = "googleCloudLibrariesBom" }
# com.google.cloud:* clients are version-managed by the google-cloud libraries-bom.
google-cloud-firestore         = { module = "com.google.cloud:google-cloud-firestore" }
firebase-admin                 = { module = "com.google.firebase:firebase-admin", version.ref = "firebaseAdmin" }

# Test utilities
mockk                          = { module = "io.mockk:mockk", version.ref = "mockk" }

# Plugin artifacts (used by build-logic to depend on these plugins)
kotlin-gradle-plugin           = { module = "org.jetbrains.kotlin:kotlin-gradle-plugin", version.ref = "kotlin" }
kotlin-allopen-plugin          = { module = "org.jetbrains.kotlin:kotlin-allopen", version.ref = "kotlin" }
spring-boot-gradle-plugin      = { module = "org.springframework.boot:spring-boot-gradle-plugin", version.ref = "springBoot" }
spring-dm-plugin               = { module = "io.spring.gradle:dependency-management-plugin", version.ref = "springDependencyManagement" }
jib-gradle-plugin              = { module = "com.google.cloud.tools:jib-gradle-plugin", version.ref = "jib" }

[plugins]
kotlin-jvm    = { id = "org.jetbrains.kotlin.jvm", version.ref = "kotlin" }
kotlin-spring = { id = "org.jetbrains.kotlin.plugin.spring", version.ref = "kotlin" }
spring-boot   = { id = "org.springframework.boot", version.ref = "springBoot" }
spring-dm     = { id = "io.spring.dependency-management", version.ref = "springDependencyManagement" }
jib           = { id = "com.google.cloud.tools.jib", version.ref = "jib" }
